name: Release

on:
  push:
    tags:
      - "v*"

env:
  ReleaseFileName: MozaPlugin_${{ github.ref_name }}.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Build plugin DLL
        run: dotnet build -c Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Stage release files
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Path $staging -Force
          Copy-Item ./bin/x86/Release/MozaPlugin.dll $staging/

      - name: Zip release files
        run: Compress-Archive -Path ./staging/* -DestinationPath ./${{ env.ReleaseFileName }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-file
          path: ${{ env.ReleaseFileName }}

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-file

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: ${{ env.ReleaseFileName }}

      - name: Notify Discord
        if: success()
        continue-on-error: true
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          DISCORD_DEV_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          commit_url="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          short_sha="${GITHUB_SHA:0:7}"
          built=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          commit_subject=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}" \
            --jq '.commit.message' | head -n1)
          # Build the payload entirely inside jq so every interpolated value is
          # JSON-encoded safely. Unicode-safe slicing keeps us under Discord's
          # embed limits (title 256 chars, description 4096 chars).
          payload=$(jq -n \
            --arg tag         "$TAG" \
            --arg short_sha   "$short_sha" \
            --arg commit_url  "$commit_url" \
            --arg subject     "$commit_subject" \
            --arg built       "$built" \
            --arg release_url "$release_url" \
            '{
              embeds: [{
                title: (("Moza SimHub Plugin — release " + $tag)[0:250]),
                url: $release_url,
                description: (
                  "**Tag:** `" + $tag + "`" +
                  "\n**Commit:** [`" + $short_sha + "`](" + $commit_url + ") — " +
                  ($subject[0:200]) +
                  "\n**Built:** " + $built +
                  "\n[View release notes](" + $release_url + ")"
                ),
                color: 3066993
              }]
            }')

          post_discord() {
            local name="$1" url="$2"
            if [ -z "$url" ]; then
              echo "$name: webhook not set, skipping."
              return 0
            fi
            local response_file http_code
            response_file=$(mktemp)
            http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
              -H "Content-Type: application/json" \
              -X POST -d "$payload" "$url") || http_code="000"
            if [[ "$http_code" =~ ^2[0-9][0-9]$ ]]; then
              echo "$name: notification sent (HTTP $http_code)."
            else
              echo "::warning::$name: notification failed (HTTP $http_code)"
              echo "Payload:"
              echo "$payload"
              echo "Response body:"
              cat "$response_file" || true
              echo
            fi
            rm -f "$response_file"
          }

          post_discord "release channel" "${DISCORD_RELEASE_WEBHOOK_URL:-}"
          post_discord "dev channel"     "${DISCORD_DEV_WEBHOOK_URL:-}"
